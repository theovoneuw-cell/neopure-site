# Configuration Pages CMS (https://pagescms.org) — back-office d'édition.
# Le client édite ces contenus sur app.pagescms.org ; chaque enregistrement
# commite dans le repo, l'Action Eleventy reconstruit le site.

media:
  - name: clients-media
    label: Logos clients
    input: assets/clients
    output: /assets/clients
    extensions: [png, jpg, jpeg, webp, svg]
  - name: gallery-media
    label: Médias galerie
    input: assets/gallery
    output: /assets/gallery
    extensions: [jpg, jpeg, png, webp, mp4]
  - name: team-media
    label: Photos équipe
    input: assets/team
    output: /assets/team
    extensions: [png, jpg, jpeg, webp]

content:
  - name: clients
    label: Logos clients
    type: file
    path: src/_data/clients.json
    list: true
    # Glisser-déposer pour réordonner. Logo carré, min 500×500.
    fields:
      - { name: src, label: Logo (carré), type: image, options: { media: clients-media } }
      - { name: alt, label: Nom du client, type: string }

  - name: gallery
    label: Galerie (photos & vidéos)
    type: file
    path: src/_data/gallery.json
    list: true
    # Glisser-déposer pour réordonner. Photo verticale 4:5, ou vidéo .mp4.
    fields:
      - { name: type, label: Type, type: select, options: { values: [image, video] } }
      - { name: src, label: Fichier (photo ou vidéo), type: image, options: { media: gallery-media, extensions: [jpg, jpeg, png, webp, mp4] } }
      - { name: poster, label: Vignette (pour une vidéo), type: image, options: { media: gallery-media } }
      - { name: alt, label: Description (photo), type: string }
      - { name: variant, label: "Format (vide / wide / tall / vid)", type: select, options: { values: ["", wide, tall, vid] } }
      - { name: delay, label: "Délai d'apparition (0 à 2)", type: number }

  - name: site
    label: Textes du site
    type: file
    path: src/_data/site.json
    fields:
      - name: stats
        label: Chiffres clés
        type: object
        list: true
        fields:
          - { name: num, label: "Affichage (ex : +35K)", type: string }
          - { name: count, label: Valeur chiffrée, type: string }
          - { name: prefix, label: Préfixe, type: string }
          - { name: suffix, label: Suffixe, type: string }
          - { name: delay, label: Délai, type: number }
          - { name: label, label: Légende, type: string }
      - name: servicesCom
        label: "Services — La Com'"
        type: object
        list: true
        fields:
          - { name: key, label: Identifiant (ne pas changer), type: string }
          - { name: label, label: Titre, type: string }
          - { name: desc, label: Description, type: text }
      - name: servicesEvent
        label: "Services — L'Event"
        type: object
        list: true
        fields:
          - { name: key, label: Identifiant (ne pas changer), type: string }
          - { name: label, label: Titre, type: string }
          - { name: desc, label: Description, type: text }
      - name: teamLead
        label: "Équipe — phrase d'intro"
        type: text
      - name: teamMembers
        label: "Équipe — membres (cards)"
        type: object
        list: true
        fields:
          - { name: name, label: Prénom, type: string }
          - { name: role, label: "Rôle (ex : Le cerveau & le moteur)", type: string }
          - { name: photo, label: Photo (tête détourée PNG), type: image, options: { media: team-media } }
          - { name: desc, label: Description, type: text }
      - name: teamOutro
        label: "Équipe — phrase de fin"
        type: text

      # Textes marketing des sections. ⚠️ Certains contiennent des balises de
      # mise en forme (ex. <span class="gradient-text">…</span> pour le dégradé,
      # <em>…</em>, <br />) : les GARDER telles quelles, éditer seulement le texte.
      - name: content
        label: Textes principaux
        type: object
        fields:
          - { name: heroSlogan,      label: "Accueil — slogan", type: string }
          - { name: statsHeading,    label: "Confiance — titre (garder <em>)", type: text }
          - { name: galleryHeading,  label: "Galerie — titre (garder les <span>)", type: text }
          - { name: galleryAccroche, label: "Galerie — accroche", type: text }
          - { name: servicesLead,    label: "Services — accroche (garder le <span>)", type: text }
          - { name: servicesTitle,   label: "Services — titre (garder le <span>)", type: text }
          - { name: mapEyebrow,      label: "Carte — sur-titre", type: string }
          - { name: mapHeading,      label: "Carte — titre (garder <span> et <br />)", type: text }
          - { name: mapText,         label: "Carte — texte", type: text }
          - { name: contactTitle,    label: "Contact — titre", type: string }
          - { name: contactNote,     label: "Contact — note sous le formulaire", type: text }
          - { name: footerTagline,   label: "Pied de page — description (garder <br />)", type: text }
